version: '3.8'

services:
  api-v1:
    build: 
      context: .
      dockerfile: src/api/v1/Dockerfile
    deploy:
      replicas: 3 
    volumes:
      - ./model:/app/model    
    networks:
      - api-server-net

  api-v2:
    build:
      context: .
      dockerfile: src/api/v2/Dockerfile
    volumes:
      - ./model:/app/model    
    networks:
      - api-server-net

  nginx:
    build: ./deployments/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/certs:/etc/nginx/certs:ro
      - ./deployments/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - api-v1
      - api-v2    
    networks:
      - api-server-net

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    environment:
      SCRAPE_URI: https://nginx/nginx_status    
    networks:
      - api-server-net

  prometheus: 
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - nginx_exporter    
    networks:
      - api-server-net

  grafana: 
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus    
    networks:
      - api-server-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  api-server-net:
    driver: bridge